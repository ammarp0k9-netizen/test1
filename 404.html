<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TEST1 ROUTER V2</title>
  <script>
    (function () {
      var location = window.location;
      var parts = location.pathname.split('/').filter(Boolean);
      var isGitHubPages = location.hostname.endsWith('.github.io');

      var projectBase = isGitHubPages && parts.length
        ? '/' + parts[0]
        : '';

      var routeParts = isGitHubPages
        ? parts.slice(1)
        : parts;

      var route = '/' + routeParts.join('/');

      var params = new URLSearchParams();
      params.set('p', route || '/');

      if (location.search) {
        params.set('q', location.search.slice(1));
      }

      location.replace(
        location.origin +
        projectBase +
        '/?' +
        params.toString() +
        location.hash
      );
    })();
  </script>
</head>

<body></body>
</html>
